<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Solar System</title>
    <style> 
    body { margin: 0;overflow: hidden;} 
    #infoPanel {
        position: fixed;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 12px 18px;
        border-radius: 8px;
        border: 1px solid #ffaa00;
        font-family: 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        max-width: 220px;
        pointer-events: none;
        display: none;
        z-index: 100;
        box-shadow: 0 0 12px rgba(255,170,0,0.3);
    }
    #infoPanel h3 {
        margin: 0 0 6px;
        color: #ffaa00;
    }
    </style>
</head>
<body>

    <div id="infoPanel">
        <h3 id="planetName">太阳</h3>
        <p id="planetInfo">介绍内容</p>
    </div>
    <script src="textures_base64.js"></script>
    <script type="importmap">
        {
            "imports": {
            "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景、相机、渲染器
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 100); // 拉远一点，能看到全貌
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 光照
        const ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);
        const sunLight = new THREE.PointLight(0xffffff, 3, 0, 0);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(1, 1, 1);
        scene.add(dirLight);

        // 纹理加载器
        const loader = new THREE.TextureLoader();

        if (textureBase64 && textureBase64['stars_milky.jpg']) {
            scene.background = loader.load(textureBase64['stars_milky.jpg']);
        }

        // 行星数据（轨道已拉开，不再重叠）
        const planetData = [
            { name: 'mercury', radius: 0.38, distance: 10,  speed: 1.6, texture: 'mercury.jpg', info: '水星：最靠近太阳的行星，温差极大。' },
            { name: 'venus',   radius: 0.95, distance: 14,  speed: 1.2, texture: 'venus.jpg',   info: '金星：最亮的行星，表面被浓厚的大气覆盖。' },
            { name: 'earth',   radius: 1.0,  distance: 18,  speed: 1.0, texture: 'earth.jpg',   info: '地球：我们的家园，已知唯一有生命存在的星球。' },
            { name: 'mars',    radius: 0.53, distance: 23,  speed: 0.8, texture: 'mars.jpg',    info: '火星：红色星球，可能存在过液态水。' },
            { name: 'jupiter', radius: 13,   distance: 45,  speed: 0.5, texture: 'jupiter.jpg', info: '木星：太阳系最大的行星，拥有巨大的风暴。' },
            { name: 'saturn',  radius: 11,   distance: 76,  speed: 0.4, texture: 'saturn.jpg',  info: '土星：以其美丽的环系统而闻名。' },
            { name: 'uranus',  radius: 5.0,  distance: 100, speed: 0.3, texture: 'uranus.jpg',  info: '天王星：侧躺着旋转的冰巨星。' },
            { name: 'neptune', radius: 4.5,  distance: 118, speed: 0.2, texture: 'neptune.jpg', info: '海王星：太阳系最远的行星，风速极快。' },
        ];

        // 太阳
        const sunRadius = 8;
        const sunGeometry = new THREE.SphereGeometry(sunRadius, 64, 64);
        const sunTexture = loader.load(textureBase64['sun.jpg']);
        const sunMaterial = new THREE.MeshStandardMaterial({
            map: sunTexture,
            emissive: new THREE.Color(0xffcc00),
            emissiveIntensity: 0.8,
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.userData = {
            name: '太阳',
            info: '太阳：太阳系的中心恒星，拥有巨大的能量。'
        };
        scene.add(sun);

        // 创建行星
        function createPlanet({ radius, distance, speed, texture, info}) {
            const pivot = new THREE.Object3D();
            pivot.rotation.y = Math.random() * Math.PI * 2;
            scene.add(pivot);

            const geometry = new THREE.SphereGeometry(radius, 48, 48);
            const map = loader.load(textureBase64[texture]);
            const material = new THREE.MeshStandardMaterial({ map: map });
            const planet = new THREE.Mesh(geometry, material);
            planet.userData = {
                name: name,       // 传入的 name 参数
                info: info        // 传入的 info 参数
            };
            planet.position.x = distance;
            pivot.add(planet);

            pivot.userData = { speed, planet };
            return pivot;
        }

        const planetPivots = planetData.map(data => createPlanet(data));

        // 土星环
        const saturnPivot = planetPivots.find((_, i) => planetData[i].name === 'saturn');
        if (saturnPivot) {
            const saturnMesh = saturnPivot.userData.planet;
            const ringTexture = loader.load(textureBase64['saturn_ring.png']);
            const ringGeometry = new THREE.RingGeometry(
                saturnMesh.geometry.parameters.radius * 1.4,
                saturnMesh.geometry.parameters.radius * 2.2,
                64
            );
            const ringMaterial = new THREE.MeshStandardMaterial({
                map: ringTexture,
                side: THREE.DoubleSide,
                transparent: true,
                depthWrite: false,
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            saturnMesh.add(ring);
        }

        // 月球绕地球
        const earthPivot = planetPivots.find((_, i) => planetData[i].name === 'earth');
        let moonOrbit = null;
        if (earthPivot) {
            const earthMesh = earthPivot.userData.planet;
            moonOrbit = new THREE.Object3D();
            earthMesh.add(moonOrbit);

            const moonGeometry = new THREE.SphereGeometry(0.27, 32, 32);
            const moonTexture = loader.load(textureBase64['moon.jpg']);
            const moonMaterial = new THREE.MeshStandardMaterial({ map: moonTexture });
            const moon = new THREE.Mesh(moonGeometry, moonMaterial);
            moon.position.x = 1.8;
            moonOrbit.add(moon);
        }

        // 控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.minDistance = 3;
        controls.maxDistance = 300; // 能拉远看到最外层轨道
        controls.target.set(0, 0, 0);
        controls.enablePan = false;
        controls.update();

        // ========== 交互：点击天体显示介绍 ==========
        const infoPanel = document.getElementById('infoPanel');
        const planetNameEl = document.getElementById('planetName');
        const planetInfoEl = document.getElementById('planetInfo');

        // 收集所有可点击的天体 mesh
        const clickableObjects = [sun];
        planetPivots.forEach(pivot => {
            clickableObjects.push(pivot.userData.planet);
        });
        // 如果有月球，也加进去（需要确保 moonOrbit 已定义，可放在月球创建之后）
        if (typeof moonOrbit !== 'undefined' && moonOrbit) {
            clickableObjects.push(moonOrbit.children[0]);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 速度倍率
        let speedMultiplier = 1.0;
        const DEFAULT_SPEED = 1.0;
        const MIN_SPEED = 0.2;
        const MAX_SPEED = 5.0;

        function onClick(event) {
        // 计算鼠标位置归一化坐标
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableObjects);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj.userData && obj.userData.info) {
                    planetNameEl.textContent = obj.userData.name;
                    planetInfoEl.textContent = obj.userData.info;
                    // 面板显示在鼠标右下方 15px 处
                    infoPanel.style.left = (event.clientX + 15) + 'px';
                    infoPanel.style.top = (event.clientY + 15) + 'px';
                    infoPanel.style.display = 'block';
                }
            } else {
                infoPanel.style.display = 'none';
            }
        }

        renderer.domElement.addEventListener('click', onClick);

        // 动画
        function animate() {
            requestAnimationFrame(animate);

            sun.rotation.y += 0.0003 * speedMultiplier;
            planetPivots.forEach(pivot => {
                pivot.rotation.y += pivot.userData.speed * 0.003 * speedMultiplier;
                pivot.userData.planet.rotation.y += 0.005 * speedMultiplier;
            });
            if (moonOrbit) moonOrbit.rotation.y += 0.015 * speedMultiplier;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 键盘控制加速
        window.addEventListener('keydown', (event) => {
            switch (event.key) {
                case '+':
                case '=':          // 有些键盘需要 Shift 才能输入 +，直接 = 更方便
                case 'ArrowUp':
                    speedMultiplier = Math.min(MAX_SPEED, speedMultiplier + 0.3);
                    break;
                case '-':
                case 'ArrowDown':
                    speedMultiplier = Math.max(MIN_SPEED, speedMultiplier - 0.3);
                    break;
                case 'r':
                case 'R':
                    speedMultiplier = DEFAULT_SPEED;
                    break;
                default:
                    break; // 其他键忽略
            }
        });
    </script>
</body>
</html>
